name: AI Spec Evolution Pipeline

on:
  schedule:
    # Mon, Wed, Fri at 02:00 UTC — collection pipeline
    - cron: "0 2 * * 1,3,5"
    # Saturday at 03:00 UTC — discovery layer (weekly)
    - cron: "0 3 * * 6"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Pipeline mode"
        type: choice
        options: [full, discovery, collect-only]
        default: full

permissions:
  issues: write
  contents: read

jobs:
  spec-evolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pipeline
        if: github.event.inputs.run_mode == 'full' || github.event.inputs.run_mode == ''
        env:
          DASHSCOPE_PRO: ${{ secrets.DASHSCOPE_PRO }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m src.cli run

      - name: Run discovery
        if: github.event.inputs.run_mode == 'discovery' || (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 6')
        env:
          DASHSCOPE_PRO: ${{ secrets.DASHSCOPE_PRO }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m src.cli discover

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: data/

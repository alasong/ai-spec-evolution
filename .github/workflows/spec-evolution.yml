name: AI Spec Evolution Pipeline

on:
  schedule:
    # Mon, Wed, Fri at 02:00 UTC
    - cron: "0 2 * * 1,3,5"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Pipeline mode"
        type: choice
        options: [full, filter-only, verify-only]
        default: full

permissions:
  issues: write
  contents: read

jobs:
  spec-evolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pipeline
        env:
          DASHSCOPE_PRO: ${{ secrets.DASHSCOPE_PRO }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m src.cli run

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: data/
